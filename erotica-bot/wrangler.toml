name = "rotationtv-erotica-bot"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# Secrets (set via: npx wrangler secret put <KEY>)
# VENICE_API_KEY
# TELEGRAM_BOT_TOKEN
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# SUPABASE_ANON_KEY
# CF_ACCOUNT_ID
# CF_STREAM_TOKEN

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your_kv_namespace_id_here"
