name = "rtv-edge-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Auth: Supabase session (not raw Telegram initData)
# Routes: stream create/end/play/list, gift send, stream webhook

[vars]
ENVIRONMENT = "production"

# Secrets (set via: npx wrangler secret put <KEY>)
# SUPABASE_URL          — zzybjoowhkwuomnpixuy project URL
# SUPABASE_ANON_KEY     — for /auth/v1/user verification
# SUPABASE_SERVICE_KEY  — for service-role DB writes + RPC
# CF_ACCOUNT_ID         — Cloudflare account ID
# CF_STREAM_TOKEN       — Cloudflare Stream API token
# CF_STREAM_SIGNING_KEY — Stream webhook HMAC key

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your_kv_namespace_id_here"
